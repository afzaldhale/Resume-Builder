<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resume</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      padding: 30px;
      color: #111;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    .contact {
      margin-bottom: 20px;
      font-size: 14px;
      color: #444;
    }
    .section {
      margin-top: 20px;
    }
    .section h2 {
      font-size: 18px;
      border-bottom: 2px solid #000;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>

  <h1>{{FULL_NAME}}</h1>
  <div class="contact">
    {{EMAIL}} | {{PHONE}}
  </div>

  <div class="section">
    <h2>Summary</h2>
    <p>{{SUMMARY}}</p>
  </div>

</body>
</html>
